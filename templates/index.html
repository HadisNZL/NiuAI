<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIU AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --bg-container: white;
            --bg-header: #fff;
            --bg-chat: #fafafa;
            --bg-input: white;
            --bg-msg-user: #1677ff;
            --bg-msg-assistant: white;
            --bg-msg-system: #fffbe6;
            --bg-code: #f5f5f5;
            --bg-hover: #f0f0f0;
            --border-color: #e8e8e8;
            --text-primary: #1a1a1a;
            --text-secondary: #999;
            --text-msg-system: #ad8b00;
            --shadow: 0 4px 24px rgba(0,0,0,0.1);
        }

        body.dark {
            --bg-body: #1a1a1a;
            --bg-container: #2d2d2d;
            --bg-header: #2d2d2d;
            --bg-chat: #252525;
            --bg-input: #2d2d2d;
            --bg-msg-user: #1677ff;
            --bg-msg-assistant: #3a3a3a;
            --bg-msg-system: #3d3d00;
            --bg-code: #1f1f1f;
            --bg-hover: #3a3a3a;
            --border-color: #444;
            --text-primary: #e8e8e8;
            --text-secondary: #999;
            --text-msg-system: #ffeb3b;
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg-body); height: 100vh; display: flex; justify-content: center; align-items: center; transition: background 0.3s; }
        .app-container { width: 100%; max-width: 900px; height: 100vh; max-height: 850px; background: var(--bg-container); border-radius: 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; margin: 20px; position: relative; transition: all 0.3s; }
        .header { padding: 14px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--bg-header); gap: 8px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-left h1 { font-size: 17px; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
        .header-left .subtitle { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
        .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .settings-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.2s; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .settings-btn:hover { background: var(--bg-hover); }
        .model-selector { display: flex; align-items: center; gap: 6px; }
        .model-selector select { padding: 5px 10px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-input); color: var(--text-primary); font-size: 13px; cursor: pointer; outline: none; max-width: 170px; }
        .model-selector select:focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
        .header-btn { padding: 5px 10px; background: var(--bg-hover); border: 1px solid var(--border-color); border-radius: 8px; font-size: 12px; cursor: pointer; color: var(--text-primary); transition: all 0.2s; white-space: nowrap; }
        .header-btn:hover { opacity: 0.8; }
        .header-btn.export-btn { color: #1677ff; border-color: #1677ff; background: rgba(22,119,255,0.1); }

        .chat-box { flex: 1; overflow-y: auto; padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; background: var(--bg-chat); }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-wrap: break-word; }
        .message.user { align-self: flex-end; background: var(--bg-msg-user); color: white; border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: var(--bg-msg-assistant); color: var(--text-primary); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }
        .message.system { align-self: center; background: var(--bg-msg-system); border: 1px solid var(--border-color); color: var(--text-msg-system); font-size: 12px; padding: 6px 14px; text-align: center; max-width: 95%; }

        .message.assistant pre { background: var(--bg-code); border-radius: 8px; padding: 12px; overflow-x: auto; border: 1px solid var(--border-color); margin: 8px 0; }
        .message.assistant code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; background: var(--bg-code); padding: 2px 6px; border-radius: 4px; }
        .message.assistant pre code { background: none; padding: 0; border-radius: 0; }
        .message.assistant p { margin: 4px 0; }
        .message.assistant ul, .message.assistant ol { padding-left: 20px; margin: 4px 0; }
        .message.assistant table { border-collapse: collapse; margin: 8px 0; font-size: 13px; }
        .message.assistant th, .message.assistant td { border: 1px solid var(--border-color); padding: 5px 10px; }
        .message.assistant th { background: var(--bg-hover); font-weight: 600; }
        .message.assistant blockquote { border-left: 3px solid #1677ff; padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
        .message.assistant h1, .message.assistant h2, .message.assistant h3 { margin: 10px 0 4px; font-weight: 600; }
        .message.assistant a { color: #1677ff; text-decoration: underline; }

        .reasoning-block { background: rgba(22,119,255,0.1); border-left: 3px solid #1677ff; padding: 8px 12px; margin-bottom: 6px; border-radius: 0 8px 8px 0; font-size: 12px; color: var(--text-primary); line-height: 1.5; }

        .code-actions { position: relative; }
        .code-actions button { position: absolute; top: 8px; right: 8px; padding: 4px 12px; font-size: 11px; background: #1677ff; color: white; border: none; border-radius: 6px; cursor: pointer; opacity: 0.8; }
        .code-actions button:hover { opacity: 1; }

        .input-area { padding: 10px 20px 14px; border-top: 1px solid var(--border-color); background: var(--bg-input); }
        .toolbar { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
        .toolbar span { font-size: 11px; color: var(--text-secondary); }
        .toolbar select { padding: 3px 6px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 12px; background: var(--bg-input); color: var(--text-primary); cursor: pointer; outline: none; max-width: 150px; }

        .input-row { display: flex; gap: 8px; align-items: flex-end; }
        .input-row textarea { flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 14px; resize: none; outline: none; font-family: inherit; min-height: 40px; max-height: 100px; line-height: 1.5; background: var(--bg-input); color: var(--text-primary); }
        .input-row textarea:focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
        .input-row button { padding: 8px 20px; background: #1677ff; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; align-self: flex-end; }
        .input-row button:hover { background: #4096ff; }
        .input-row button:disabled { background: #a0c4ff; cursor: not-allowed; }
        .input-row .clear-btn { background: transparent; color: var(--text-secondary); padding: 8px 6px; font-size: 16px; }
        .input-row .clear-btn:hover { color: #ff4d4f; background: transparent; }

        .loading-indicator { align-self: center; color: var(--text-secondary); font-size: 13px; display: none; padding: 4px; }

        .modal-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; border-radius: 16px; }
        .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
        .modal { background: var(--bg-container); border-radius: 16px; width: 90%; max-width: 520px; max-height: 85%; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .modal-header .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-secondary); padding: 4px; line-height: 1; }
        .modal-header .close-btn:hover { color: var(--text-primary); }
        .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 8px; }
        .model-list { margin-bottom: 16px; }
        .model-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; background: var(--bg-input); }
        .model-list-item:hover { border-color: #1677ff; background: rgba(22,119,255,0.05); }
        .model-list-item .model-name { font-weight: 500; font-size: 14px; color: var(--text-primary); }
        .model-list-item .model-detail { font-size: 11px; color: var(--text-secondary); }
        .reasoning-block::before { content: "\f1a0 思考过程"; display: block; font-size: 11px; color: #1677ff; font-weight: 500; margin-bottom: 3px; }

        .loading-indicator { align-self: center; color: var(--text-secondary); font-size: 13px; display: none; padding: 4px; }
        .loading-indicator.active { display: block; }

        /* === 设置面板（Modal） === */
        .modal-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; border-radius: 16px; }
        .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
        .modal { background: var(--bg-container); border-radius: 16px; width: 90%; max-width: 520px; max-height: 85%; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .modal-header .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-secondary); padding: 4px; line-height: 1; }
        .modal-header .close-btn:hover { color: var(--text-primary); }
        .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 8px; }
        .model-list { margin-bottom: 16px; }
        .model-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; background: var(--bg-input); }
        .model-list-item:hover { border-color: #1677ff; background: rgba(22,119,255,0.1); }
        .model-list-item .model-name { font-weight: 500; font-size: 14px; color: var(--text-primary); }
        .model-list-item .model-detail { font-size: 11px; color: var(--text-secondary); }
        .model-list-item .del-btn { background: none; border: none; color: #ff4d4f; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
        .model-list-item .del-btn:hover { background: rgba(255,77,79,0.1); }
        .add-btn { width: 100%; padding: 8px; border: 1px dashed var(--border-color); border-radius: 8px; background: none; color: #1677ff; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .add-btn:hover { border-color: #1677ff; background: rgba(22,119,255,0.05); }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; outline: none; background: var(--bg-input); color: var(--text-primary); }
        .form-group input:focus, .form-group select:focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
        .form-row { display: flex; gap: 8px; }
        .form-row .form-group { flex: 1; }
        .btn-primary { padding: 7px 18px; background: #1677ff; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
        .btn-primary:hover { background: #4096ff; }
        .btn-default { padding: 7px 18px; background: var(--bg-hover); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 8px; font-size: 13px; cursor: pointer; }
        .btn-default:hover { opacity: 0.8; }

        @media (max-width: 600px) {
            .app-container { max-height: 100vh; margin: 0; border-radius: 0; }
            .modal-overlay.active { border-radius: 0; }
            .message { max-width: 92%; }
        }

        /* === Diff 预览 === */
        .diff-container { background: var(--bg-code); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; margin: 8px 0; font-family: 'SF Mono', monospace; font-size: 12px; }
        .diff-header { font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
        .diff-line { padding: 2px 4px; line-height: 1.4; }
        .diff-line.add { background: rgba(0,170,85,0.2); color: #0a5; }
        .diff-line.remove { background: rgba(221,0,0,0.2); color: #d00; }
        .diff-line.context { color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <h1>NIU AI</h1>
                <span class="subtitle">by 牛梓霖</span>
            </div>
            <div class="header-controls">
                <div class="model-selector">
                    <button class="settings-btn" id="theme-btn" title="切换主题">🌓</button>
                    <button class="settings-btn" id="sessions-btn" title="会话管理">💬</button>
                    <button class="settings-btn" id="project-btn" title="项目结构">📁</button>
                    <button class="settings-btn" id="git-btn" title="Git 操作">🔀</button>
                    <button class="settings-btn" id="settings-btn" title="模型设置">⚙️</button>
                    <select id="model-select"><option value="">加载中...</option></select>
                </div>
                <button class="header-btn export-btn" id="export-btn" title="导出对话">📥 导出</button>
            </div>
        </div>

        <!-- 会话管理面板 -->
        <div class="modal-overlay" id="sessions-modal">
            <div class="modal">
                <div class="modal-header">
                    <h2>💬 会话管理</h2>
                    <button class="close-btn" id="sessions-close">×</button>
                </div>
                <div class="modal-body">
                    <div style="margin-bottom:16px;">
                        <button class="add-btn" id="new-session-btn">➕ 新建会话</button>
                    </div>
                    <div id="sessions-list"></div>
                </div>
            </div>
        </div>

        <!-- 项目结构面板 -->
        <div class="modal-overlay" id="project-modal">
            <div class="modal">
                <div class="modal-header">
                    <h2>📁 项目结构</h2>
                    <button class="close-btn" id="project-close">×</button>
                </div>
                <div class="modal-body">
                    <button class="add-btn" id="refresh-project-btn" style="margin-bottom:12px;">🔄 刷新</button>
                    <div id="project-structure" style="font-size:12px;font-family:monospace;white-space:pre;overflow:auto;max-height:500px;"></div>
                </div>
            </div>
        </div>

        <!-- Git 操作面板 -->
        <div class="modal-overlay" id="git-modal">
            <div class="modal">
                <div class="modal-header">
                    <h2>🔀 Git 操作</h2>
                    <button class="close-btn" id="git-close">×</button>
                </div>
                <div class="modal-body">
                    <div style="margin-bottom:12px;">
                        <button class="add-btn" id="git-status-btn">📊 Status</button>
                        <button class="add-btn" id="git-diff-btn" style="margin-left:8px;">📝 Diff</button>
                        <button class="add-btn" id="git-commit-btn" style="margin-left:8px;">💾 Commit</button>
                        <button class="add-btn" id="git-push-btn" style="margin-left:8px;">🚀 Push</button>
                    </div>
                    <div id="git-output" style="font-size:12px;font-family:monospace;white-space:pre-wrap;overflow:auto;max-height:400px;background:var(--bg-code);padding:12px;border-radius:8px;"></div>
                </div>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message system">选择模型，开始对话吧 ✨ 点击 ⚙️ 配置模型</div>
        </div>

        <div class="loading-indicator" id="loading">AI 思考中...</div>

        <div class="input-area">
            <div class="toolbar">
                <span>快捷提示词：</span>
                <select id="prompt-select"><option value="">— 选择模板 —</option></select>
                <span style="margin-left:16px;">工具：</span>
                <button class="header-btn" id="tool-read-file" style="padding:3px 8px;font-size:11px;" title="读取文件">📄 读取文件</button>
                <button class="header-btn" id="tool-edit-file" style="padding:3px 8px;font-size:11px;" title="编辑文件">✏️ 编辑文件</button>
            </div>
            <div class="input-row">
                <button class="clear-btn" id="clear-btn" title="清空对话">🗑️</button>
                <textarea id="message-input" placeholder="输入你的问题... (Enter 发送, Shift+Enter 换行)" rows="1" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
                <button id="send-btn">发送</button>
            </div>
        </div>

        <!-- 设置面板 Modal -->
        <div class="modal-overlay" id="settings-modal">
            <div class="modal">
                <div class="modal-header">
                    <h2>⚙️ 模型设置</h2>
                    <button class="close-btn" id="modal-close">×</button>
                </div>
                <div class="modal-body" id="modal-body">
                    <div class="model-list" id="model-list"></div>
                    <button class="add-btn" id="add-model-btn">＋ 添加新模型</button>

                    <div id="model-form" style="display:none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e8e8e8;">
                        <h3 id="form-title" style="font-size:14px;margin-bottom:12px;font-weight:600;">编辑模型</h3>
                        <div class="form-group">
                            <label>模型标识 (Key) *</label>
                            <input id="form-key" placeholder="例如: my-model" />
                        </div>
                        <div class="form-group">
                            <label>显示名称 (Name) *</label>
                            <input id="form-name" placeholder="例如: My Custom Model" />
                        </div>
                        <div class="form-group">
                            <label>Provider</label>
                            <select id="form-provider">
                                <option value="openai">OpenAI 兼容</option>
                                <option value="anthropic">Anthropic</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>API Key *</label>
                            <input id="form-api-key" type="password" placeholder="sk-..." />
                        </div>
                        <div class="form-group">
                            <label>API Base URL *</label>
                            <input id="form-base" placeholder="https://api.openai.com" />
                        </div>
                        <div class="form-group">
                            <label>模型名 (Model) *</label>
                            <input id="form-model" placeholder="gpt-4o" />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Max Tokens</label>
                                <input id="form-tokens" type="number" value="4096" />
                            </div>
                            <div class="form-group">
                                <label>Temperature</label>
                                <input id="form-temp" type="number" step="0.1" min="0" max="2" value="0.7" />
                            </div>
                        </div>
                        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                            <button class="btn-default" id="form-cancel" style="padding:6px 16px;">取消</button>
                            <button class="btn-primary" id="form-save" style="padding:6px 16px;">💾 保存</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-default" id="modal-close-btn">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoading = false;
        let modelsData = [];
        let editingKey = null;

        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const exportBtn = document.getElementById('export-btn');
        const modelSelect = document.getElementById('model-select');
        const promptSelect = document.getElementById('prompt-select');
        const loading = document.getElementById('loading');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const modalClose = document.getElementById('modal-close');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const addModelBtn = document.getElementById('add-model-btn');
        const modelList = document.getElementById('model-list');
        const modelForm = document.getElementById('model-form');
        const formTitle = document.getElementById('form-title');
        const formKey = document.getElementById('form-key');
        const formName = document.getElementById('form-name');
        const formProvider = document.getElementById('form-provider');
        const formApiKey = document.getElementById('form-api-key');
        const formBase = document.getElementById('form-base');
        const formModel = document.getElementById('form-model');
        const formTokens = document.getElementById('form-tokens');
        const formTemp = document.getElementById('form-temp');
        const formSave = document.getElementById('form-save');
        const formCancel = document.getElementById('form-cancel');
        const sessionsBtn = document.getElementById('sessions-btn');
        const sessionsModal = document.getElementById('sessions-modal');
        const sessionsClose = document.getElementById('sessions-close');
        const sessionsList = document.getElementById('sessions-list');
        const newSessionBtn = document.getElementById('new-session-btn');
        const themeBtn = document.getElementById('theme-btn');
        const projectBtn = document.getElementById('project-btn');
        const projectModal = document.getElementById('project-modal');
        const projectClose = document.getElementById('project-close');
        const projectStructure = document.getElementById('project-structure');
        const refreshProjectBtn = document.getElementById('refresh-project-btn');
        const gitBtn = document.getElementById('git-btn');
        const gitModal = document.getElementById('git-modal');
        const gitClose = document.getElementById('git-close');
        const gitOutput = document.getElementById('git-output');
        const gitStatusBtn = document.getElementById('git-status-btn');
        const gitDiffBtn = document.getElementById('git-diff-btn');
        const gitCommitBtn = document.getElementById('git-commit-btn');
        const gitPushBtn = document.getElementById('git-push-btn');

        let currentSessionId = localStorage.getItem('currentSessionId') || 'default';

        if (typeof marked !== 'undefined') {
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
        }

        // === 主题切换 ===
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                themeBtn.textContent = '☀️';
            }
        }

        themeBtn.addEventListener('click', function() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            themeBtn.textContent = isDark ? '☀️' : '🌓';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        initTheme();

        // === 会话管理 ===
        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const sessions = await res.json();
                sessionsList.innerHTML = '';

                sessions.forEach(session => {
                    const item = document.createElement('div');
                    item.className = 'model-list-item';
                    item.innerHTML = `
                        <div>
                            <div class="model-name">${session.is_current ? '✓ ' : ''}${session.name}</div>
                            <div class="model-detail">${session.message_count} 条消息</div>
                        </div>
                        <button class="del-btn" onclick="deleteSession('${session.id}')">🗑️</button>
                    `;
                    if (!session.is_current) {
                        item.onclick = (e) => {
                            if (!e.target.classList.contains('del-btn')) {
                                switchSession(session.id);
                            }
                        };
                        item.style.cursor = 'pointer';
                    }
                    sessionsList.appendChild(item);
                });
            } catch(err) {
                sessionsList.innerHTML = '<div style="color:#f00;">加载失败</div>';
            }
        }

        async function switchSession(sessionId) {
            try {
                await fetch(`/api/sessions/${sessionId}`, {method: 'POST'});
                currentSessionId = sessionId;
                localStorage.setItem('currentSessionId', sessionId);

                // 获取当前会话的历史对话
                const res = await fetch('/api/sessions/current');
                const data = await res.json();

                chatBox.innerHTML = '';

                // 获取当前选中模型的对话历史
                const currentModel = modelSelect.value;
                const history = data.conversations[currentModel] || [];

                if (history.length === 0) {
                    chatBox.innerHTML = '<div class="message system">已切换到会话: ' + sessionId + '</div>';
                } else {
                    // 恢复所有历史消息
                    history.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = 'message ' + msg.role;
                        if (msg.role === 'assistant' && typeof marked !== 'undefined') {
                            div.innerHTML = marked.parse(msg.content);
                        } else {
                            div.textContent = msg.content;
                        }
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                sessionsModal.classList.remove('active');
                await loadSessions();
            } catch(err) {
                alert('切换失败: ' + err.message);
            }
        }

        async function deleteSession(sessionId) {
            if (!confirm('确定删除会话 "' + sessionId + '"？')) return;
            try {
                await fetch(`/api/sessions/${sessionId}`, {method: 'DELETE'});
                if (sessionId === currentSessionId) {
                    currentSessionId = 'default';
                    localStorage.setItem('currentSessionId', 'default');
                    chatBox.innerHTML = '<div class="message system">会话已删除，切换到默认会话</div>';
                }
                await loadSessions();
            } catch(err) {
                alert('删除失败: ' + err.message);
            }
        }

        newSessionBtn.addEventListener('click', async function() {
            const newSessionId = 'session_' + Date.now();
            await switchSession(newSessionId);
        });

        sessionsBtn.addEventListener('click', function() {
            sessionsModal.classList.add('active');
            loadSessions();
        });

        sessionsClose.addEventListener('click', function() {
            sessionsModal.classList.remove('active');
        });

        // === 项目结构 ===
        async function loadProjectStructure() {
            try {
                const res = await fetch('/api/project/structure');
                const data = await res.json();
                let output = '📁 项目文件:\n';
                data.files.forEach(f => {
                    output += `  ${f.path}\n`;
                });
                if (Object.keys(data.functions).length > 0) {
                    output += '\n🔧 函数:\n';
                    for (let [file, funcs] of Object.entries(data.functions)) {
                        output += `  ${file}: ${funcs.join(', ')}\n`;
                    }
                }
                if (Object.keys(data.classes).length > 0) {
                    output += '\n📦 类:\n';
                    for (let [file, classes] of Object.entries(data.classes)) {
                        output += `  ${file}: ${classes.join(', ')}\n`;
                    }
                }
                projectStructure.textContent = output;
            } catch(err) {
                projectStructure.textContent = '加载失败: ' + err.message;
            }
        }

        projectBtn.addEventListener('click', function() {
            projectModal.classList.add('active');
            loadProjectStructure();
        });

        projectClose.addEventListener('click', function() {
            projectModal.classList.remove('active');
        });

        refreshProjectBtn.addEventListener('click', loadProjectStructure);

        // === Git 操作 ===
        gitBtn.addEventListener('click', function() {
            gitModal.classList.add('active');
            gitOutput.textContent = '点击上方按钮执行 Git 操作';
        });

        gitClose.addEventListener('click', function() {
            gitModal.classList.remove('active');
        });

        gitStatusBtn.addEventListener('click', async function() {
            try {
                const res = await fetch('/api/git/status');
                const data = await res.json();
                gitOutput.textContent = data.output || '工作区干净，没有待提交的更改';
            } catch(err) {
                gitOutput.textContent = '错误: ' + err.message;
            }
        });

        gitDiffBtn.addEventListener('click', async function() {
            try {
                const res = await fetch('/api/git/diff');
                const data = await res.json();
                gitOutput.textContent = data.diff || '没有未暂存的更改';
            } catch(err) {
                gitOutput.textContent = '错误: ' + err.message;
            }
        });

        gitCommitBtn.addEventListener('click', async function() {
            const message = prompt('输入提交信息:');
            if (!message) return;
            try {
                const res = await fetch('/api/git/commit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message})
                });
                const data = await res.json();
                gitOutput.textContent = data.output || '✅ 提交成功';
            } catch(err) {
                gitOutput.textContent = '错误: ' + err.message;
            }
        });

        gitPushBtn.addEventListener('click', async function() {
            if (!confirm('确定要推送到远程仓库吗？')) return;
            try {
                gitOutput.textContent = '推送中...';
                const res = await fetch('/api/git/push', {method: 'POST'});
                const data = await res.json();
                gitOutput.textContent = data.output || '✅ 推送成功';
            } catch(err) {
                gitOutput.textContent = '错误: ' + err.message;
            }
        });

        // === 模型管理 ===
        async function loadModels() {
            try {
                const res = await fetch('/api/models');
                modelsData = await res.json();
                modelSelect.innerHTML = '';
                modelsData.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.key;
                    opt.textContent = m.name + ' (' + m.model + ')';
                    modelSelect.appendChild(opt);
                });
            } catch(err) {
                modelSelect.innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function loadPrompts() {
            try {
                const res = await fetch('/api/prompts');
                const prompts = await res.json();
                promptSelect.innerHTML = '<option value="">— 选择模板 —</option>';
                prompts.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.prompt;
                    opt.textContent = p.name;
                    promptSelect.appendChild(opt);
                });
            } catch(err) {}
        }

        // === 设置面板 ===
        function openSettings() {
            settingsModal.classList.add('active');
            modelForm.style.display = 'none';
            renderModelList();
        }

        function closeSettings() {
            settingsModal.classList.remove('active');
            modelForm.style.display = 'none';
        }

        async function renderModelList() {
            try {
                const res = await fetch('/api/models');
                const models = await res.json();
                modelList.innerHTML = '';
                models.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'model-list-item';
                    div.innerHTML = `
                        <div style="flex:1">
                            <div class="model-name">🤖 ${m.name}</div>
                            <div class="model-detail">${m.model} · ${m.api_base || '无'} · ${m.api_key_masked || '无 Key'}</div>
                        </div>
                        <button class="del-btn" data-key="${m.key}" title="删除">✕</button>
                    `;
                    div.addEventListener('click', function(e) {
                        if (e.target.classList.contains('del-btn')) return;
                        openEditForm(m.key);
                    });
                    const delBtn = div.querySelector('.del-btn');
                    delBtn.addEventListener('click', async function(e) {
                        e.stopPropagation();
                        if (confirm('确定删除模型 "' + m.name + '"？')) {
                            await fetch('/api/models/' + m.key, { method: 'DELETE' });
                            await loadModels();
                            renderModelList();
                        }
                    });
                    modelList.appendChild(div);
                });
            } catch(err) {
                modelList.innerHTML = '<div style="color:#ff4d4f;font-size:13px;">加载失败</div>';
            }
        }

        async function openEditForm(key) {
            editingKey = key;

            if (key === '__new__') {
                formTitle.textContent = '➕ 添加新模型';
                formKey.value = '';
                formName.value = '';
                formProvider.value = 'openai';
                formApiKey.value = '';
                formBase.value = '';
                formModel.value = '';
                formTokens.value = '4096';
                formTemp.value = '0.7';
                formKey.disabled = false;
            } else {
                formTitle.textContent = '✏️ 编辑模型';
                try {
                    const res = await fetch('/api/models/' + key);
                    const cfg = await res.json();
                    formKey.value = cfg.key;
                    formName.value = cfg.name;
                    formProvider.value = cfg.provider || 'openai';
                    formApiKey.value = cfg.api_key || '';
                    formBase.value = cfg.api_base || '';
                    formModel.value = cfg.model || '';
                    formTokens.value = cfg.max_tokens || 4096;
                    formTemp.value = cfg.temperature ?? 0.7;
                    formKey.disabled = true;
                } catch(err) {
                    alert('加载模型配置失败');
                    return;
                }
            }

            modelForm.style.display = 'block';
        }

        async function saveModelForm() {
            const key = formKey.value.trim();
            const name = formName.value.trim();
            const provider = formProvider.value;
            const api_key = formApiKey.value.trim();
            const api_base = formBase.value.trim();
            const model = formModel.value.trim();
            const max_tokens = parseInt(formTokens.value) || 4096;
            const temperature = parseFloat(formTemp.value) || 0.7;

            if (!key || !name || !api_key || !api_base || !model) {
                alert('请填写所有必填字段（标识、名称、API Key、Base URL、模型名）');
                return;
            }

            const payload = { key, name, provider, api_key, api_base, model, max_tokens, temperature };

            try {
                let res;
                if (editingKey === '__new__') {
                    res = await fetch('/api/models', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                } else {
                    res = await fetch('/api/models/' + editingKey, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                }

                if (!res.ok) {
                    const err = await res.json();
                    alert('保存失败: ' + (err.error || '未知错误'));
                    return;
                }

                await loadModels();
                renderModelList();
                modelForm.style.display = 'none';
                alert('✅ 保存成功！');
            } catch(err) {
                alert('网络错误: ' + err.message);
            }
        }

        // === Markdown 渲染 ===
        function renderMarkdown(text) {
            if (typeof marked !== 'undefined') {
                const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return marked.parse(escaped);
            }
            return text.replace(/\n/g, '<br>');
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message ' + role;

            if (role === 'assistant') {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'markdown-body';
                div.appendChild(contentDiv);
                div.contentDiv = contentDiv;
                div.rawContent = content || '';
                div.reasoningDiv = null;
                div.rawReasoning = '';
                if (content) contentDiv.innerHTML = renderMarkdown(content);
            } else {
                div.textContent = content;
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function updateMessage(div, newContent) {
            if (div.contentDiv) {
                div.rawContent += newContent;
                div.contentDiv.innerHTML = renderMarkdown(div.rawContent);
            } else {
                div.textContent += newContent;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message || isLoading) return;
            const model = modelSelect.value;
            if (!model) { appendMessage('system', '⚠️ 请先选择一个模型'); return; }

            appendMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            const aiDiv = appendMessage('assistant', '');
            aiDiv.rawContent = '';
            aiDiv.rawReasoning = '';

            isLoading = true;
            loading.classList.add('active');
            sendBtn.disabled = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model, message }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    aiDiv.contentDiv.innerHTML = '❌ 错误: ' + (err.error || '未知错误');
                    return;
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.trim()) {
                            try {
                                const data = JSON.parse(line);
                                if (data.content) {
                                    updateMessage(aiDiv, data.content);
                                }
                                if (data.cmd_result) {
                                    // 显示命令执行结果
                                    const cmdDiv = appendMessage('system', data.cmd_result);
                                }
                                if (data.reasoning) {
                                    if (aiDiv.reasoningDiv) {
                                        aiDiv.rawReasoning += data.reasoning;
                                        aiDiv.reasoningDiv.innerHTML = renderMarkdown(aiDiv.rawReasoning);
                                    } else {
                                        const rDiv = document.createElement('div');
                                        rDiv.className = 'reasoning-block';
                                        aiDiv.rawReasoning = data.reasoning;
                                        rDiv.innerHTML = renderMarkdown(aiDiv.rawReasoning);
                                        aiDiv.parentNode.insertBefore(rDiv, aiDiv);
                                        aiDiv.reasoningDiv = rDiv;
                                    }
                                }
                                // 工具调用
                                if (data.tool_call) {
                                    const toolDiv = document.createElement('div');
                                    toolDiv.className = 'message system';
                                    toolDiv.textContent = `🔧 调用工具: ${data.tool_call}(${JSON.stringify(data.arguments)})`;
                                    chatBox.appendChild(toolDiv);
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                                // 工具结果
                                if (data.tool_result) {
                                    const resultDiv = document.createElement('div');
                                    resultDiv.className = 'message system';

                                    try {
                                        const result = JSON.parse(data.tool_result);

                                        // 特殊处理命令执行结果
                                        if (result.command) {
                                            let displayText = `✅ 命令: ${result.command}\n`;
                                            if (result.stdout) displayText += `输出:\n${result.stdout}`;
                                            if (result.stderr) displayText += `\n错误:\n${result.stderr}`;
                                            if (result.returncode !== undefined) displayText += `\n退出码: ${result.returncode}`;
                                            resultDiv.textContent = displayText;
                                            resultDiv.style.whiteSpace = 'pre-wrap';
                                        } else {
                                            // 原有的截断显示
                                            resultDiv.textContent = `✅ 工具结果: ${data.tool_result.substring(0, 200)}${data.tool_result.length > 200 ? '...' : ''}`;
                                        }
                                    } catch {
                                        resultDiv.textContent = `✅ 工具结果: ${data.tool_result.substring(0, 200)}${data.tool_result.length > 200 ? '...' : ''}`;
                                    }

                                    chatBox.appendChild(resultDiv);
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch(err) {
                aiDiv.contentDiv.innerHTML = '❌ 网络错误: ' + err.message;
            } finally {
                isLoading = false;
                loading.classList.remove('active');
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // === 事件绑定 ===
        settingsBtn.addEventListener('click', openSettings);
        modalClose.addEventListener('click', closeSettings);
        modalCloseBtn.addEventListener('click', closeSettings);
        settingsModal.addEventListener('click', function(e) {
            if (e.target === settingsModal) closeSettings();
        });

        addModelBtn.addEventListener('click', function() { openEditForm('__new__'); });
        formCancel.addEventListener('click', function() { modelForm.style.display = 'none'; });
        formSave.addEventListener('click', saveModelForm);

        clearBtn.addEventListener('click', async function() {
            if (!confirm('确定清空当前会话的对话历史吗？')) return;
            await fetch('/api/sessions/current/clear', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({model: modelSelect.value})
            });
            chatBox.innerHTML = '<div class="message system">对话已清空，开始新对话吧！</div>';
            input.focus();
        });

        exportBtn.addEventListener('click', function() {
            window.open('/api/export', '_blank');
        });

        promptSelect.addEventListener('change', function() {
            const val = promptSelect.value;
            if (val) {
                input.value = val;
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 100) + 'px';
                input.focus();
                promptSelect.value = '';
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                if (e.isComposing || e.keyCode === 229) {
                    return;
                }
                e.preventDefault();
                sendMessage();
            }
        });

        // === 工具按钮 ===
        document.getElementById('tool-read-file').addEventListener('click', function() {
            const filename = prompt('输入要读取的文件路径（相对于项目根目录）:');
            if (filename) {
                input.value = `帮我读取文件 ${filename} 的内容，并分析一下`;
                input.focus();
            }
        });

        document.getElementById('tool-edit-file').addEventListener('click', function() {
            const filename = prompt('输入要编辑的文件路径:');
            if (filename) {
                input.value = `帮我编辑文件 ${filename}`;
                input.focus();
            }
        });

        // 初始加载
        async function initApp() {
            await loadModels();
            loadPrompts();

            // 恢复上次会话的历史消息
            try {
                await fetch(`/api/sessions/${currentSessionId}`, {method: 'POST'});
                const res = await fetch('/api/sessions/current');
                const data = await res.json();
                const currentModel = modelSelect.value;
                const history = data.conversations[currentModel] || [];

                history.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message ' + msg.role;
                    if (msg.role === 'assistant' && typeof marked !== 'undefined') {
                        div.innerHTML = marked.parse(msg.content);
                    } else {
                        div.textContent = msg.content;
                    }
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch(err) {
                console.log('恢复会话失败:', err);
            }
        }

        initApp();
    </script>
